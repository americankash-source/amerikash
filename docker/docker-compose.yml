services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: amerikash
      POSTGRES_USER: local_dev_user
      POSTGRES_PASSWORD: local_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://local_dev_user:local_dev_password@postgres:5432/amerikash

volumes:
  postgres_data:
