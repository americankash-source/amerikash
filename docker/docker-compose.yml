services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: amerikash
      POSTGRES_USER: amerikash
      POSTGRES_PASSWORD: amerikash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - ../.env.example

volumes:
  postgres_data:
